services:
  postgres:
    image: postgres:16-alpine
    container_name: svtc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: svtc
      POSTGRES_USER: svtc
      POSTGRES_PASSWORD: svtc_password
    ports:
      - "5432:5432"
    volumes:
      - svtc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U svtc -d svtc"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  svtc_postgres_data:

